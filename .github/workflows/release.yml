name: Release

# Push a version tag (e.g. `git tag v0.1.0 && git push --tags`) to build
# installers for Linux, Windows, and macOS and attach them to a GitHub Release.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # allow the workflow to create/update the Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # electron-builder builds for the host OS: ubuntu -> deb+AppImage,
      # windows -> nsis+portable, macos -> dmg. --publish always uploads the
      # artifacts to a draft GitHub Release for the pushed tag.
      - name: Build and publish
        run: npx --no-install electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'   # no code signing
